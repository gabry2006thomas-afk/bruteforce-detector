<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureGuard — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --border: #0d2d45;
    --accent: #00d4ff;
    --accent2: #ff3e3e;
    --text: #c8dce8;
    --muted: #4a6478;
    --success: #00e676;
    --warn: #ffb300;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  /* Scanline */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
    pointer-events: none; z-index: 0;
  }

  .corner-deco {
    position: fixed;
    width: 120px; height: 120px;
    border-color: var(--accent);
    border-style: solid;
    opacity: .25;
  }
  .corner-deco.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner-deco.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  .card {
    position: relative; z-index: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 0 60px rgba(0,212,255,.06), inset 0 1px 0 rgba(0,212,255,.08);
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    border: 2px solid var(--accent);
    display: grid; place-items: center;
    font-size: 18px; color: var(--accent);
    position: relative;
  }
  .logo-icon::before {
    content: ''; position: absolute; inset: 3px;
    border: 1px solid rgba(0,212,255,.3);
  }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: .08em; color: #fff; }
  .logo-sub  { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }

  h1 { font-size: 14px; font-family: var(--mono); color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 28px; }
  h1 span { color: var(--accent); }

  .field { margin-bottom: 20px; }
  label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
  input {
    width: 100%;
    background: rgba(0,212,255,.03);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,.08);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color .2s, background .2s;
    margin-top: 8px;
  }
  .btn::before {
    content: ''; position: absolute;
    inset: 0; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s ease;
    z-index: 0;
  }
  .btn:hover::before { transform: scaleX(1); }
  .btn:hover { color: var(--bg); }
  .btn span { position: relative; z-index: 1; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn:disabled::before { display: none; }

  .alert {
    display: none;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .04em;
    border-left: 3px solid;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .alert.show { display: block; animation: fadeUp .3s ease; }
  .alert.error   { border-color: var(--accent2); background: rgba(255,62,62,.07); color: #ff8080; }
  .alert.success { border-color: var(--success);  background: rgba(0,230,118,.07);  color: #80ffb0; }
  .alert.warning { border-color: var(--warn);     background: rgba(255,179,0,.07);   color: #ffd060; }
  .alert.blocked { border-color: var(--accent2); background: rgba(255,62,62,.12); color: #ff6060; }

  .attempts-bar {
    height: 3px; background: var(--border);
    margin-bottom: 16px; display: none;
  }
  .attempts-bar.show { display: block; }
  .attempts-bar-fill {
    height: 100%; background: var(--success);
    transition: width .4s ease, background .4s ease;
  }

  .footer-link {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }
  .footer-link a { color: var(--accent); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }

  .status-row {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    margin-bottom: 24px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .loading-ring {
    display: none; width: 16px; height: 16px;
    border: 2px solid transparent;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.loading .loading-ring { display: inline-block; }
  .btn.loading .btn-text { display: none; }
  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
</style>
</head>
<body>
<div class="corner-deco tl"></div>
<div class="corner-deco br"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <div>
      <div class="logo-text">SecureGuard</div>
      <div class="logo-sub">Brute Force Detection System</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot"></div>
    <span>System online · Monitoring active</span>
  </div>

  <h1>// <span>Authentication</span> required</h1>

  <div id="alert" class="alert"></div>

  <div class="attempts-bar" id="attBar">
    <div class="attempts-bar-fill" id="attFill" style="width:100%"></div>
  </div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="user@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">
    <span class="btn-inner">
      <div class="loading-ring"></div>
      <span class="btn-text">Access System</span>
    </span>
  </button>

  <div class="footer-link">
    No account? <a href="/register">Register access</a> &nbsp;·&nbsp; <a href="/admin">Admin panel</a>
  </div>
</div>

<script>
const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const btn     = document.getElementById('loginBtn');
const alertEl = document.getElementById('alert');
const attBar  = document.getElementById('attBar');
const attFill = document.getElementById('attFill');

[emailEl, passEl].forEach(el => el.addEventListener('keydown', e => e.key === 'Enter' && doLogin()));

function showAlert(msg, type) {
  alertEl.className = `alert show ${type}`;
  alertEl.textContent = msg;
}

function setLoading(v) {
  btn.disabled = v;
  btn.classList.toggle('loading', v);
}

async function doLogin() {
  const email = emailEl.value.trim();
  const password = passEl.value;
  if (!email || !password) { showAlert('Please enter email and password.', 'error'); return; }

  setLoading(true);
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('✓ Authentication successful. Redirecting…', 'success');
      setTimeout(() => window.location.href = '/dashboard', 1000);
      return;
    }

    if (data.blocked) {
      showAlert(`⛔ ${data.error}`, 'blocked');
      attBar.classList.remove('show');
      passEl.value = '';
      return;
    }

    if (data.attempts_left !== undefined) {
      const pct = (data.attempts_left / 5) * 100;
      attBar.classList.add('show');
      attFill.style.width = pct + '%';
      attFill.style.background = pct <= 40 ? '#ff3e3e' : pct <= 60 ? '#ffb300' : '#00e676';
      const warn = data.attempts_left <= 2 ? ` ⚠ ${data.attempts_left} attempt(s) remaining before lockout.` : '';
      showAlert(`${data.error}${warn}`, data.warning ? 'warning' : 'error');
    } else {
      showAlert(data.error || 'Login failed.', 'error');
    }
    passEl.value = '';
  } catch(e) {
    showAlert('Network error. Please retry.', 'error');
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
