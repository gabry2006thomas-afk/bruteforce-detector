<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureGuard — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050a0f;--panel:#0a1520;--border:#0d2d45;--accent:#00d4ff;--accent2:#ff3e3e;
    --text:#c8dce8;--muted:#4a6478;--success:#00e676;--warn:#ffb300;
    --mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
    display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;}
  .card{position:relative;z-index:1;background:var(--panel);border:1px solid var(--border);
    padding:56px 48px;width:480px;text-align:center;
    box-shadow:0 0 80px rgba(0,230,118,.05);animation:fadeUp .5s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .shield{font-size:64px;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(0,230,118,.4));
    animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
  .user{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:32px}
  .status-box{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.2);
    padding:20px 24px;margin-bottom:32px;text-align:left;}
  .status-row{display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:12px;padding:6px 0;border-bottom:1px solid rgba(0,212,255,.05)}
  .status-row:last-child{border:none}
  .status-key{color:var(--muted)}
  .status-val{color:var(--success)}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .link-btn{background:transparent;border:1px solid var(--border);color:var(--text);
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;padding:14px;
    cursor:pointer;text-decoration:none;display:block;text-align:center;
    transition:border-color .2s,color .2s}
  .link-btn:hover{border-color:var(--accent);color:var(--accent)}
  .logout-btn{width:100%;background:transparent;border:1px solid var(--accent2);color:var(--accent2);
    font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    padding:14px;cursor:pointer;transition:background .2s,color .2s}
  .logout-btn:hover{background:var(--accent2);color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="shield">🛡️</div>
  <h1>Access Granted</h1>
  <div class="user">{{ user }}</div>
  <div class="status-box">
    <div class="status-row"><span class="status-key">AUTHENTICATION</span><span class="status-val">✓ VERIFIED</span></div>
    <div class="status-row"><span class="status-key">SESSION</span><span class="status-val">✓ ACTIVE</span></div>
    <div class="status-row"><span class="status-key">THREAT LEVEL</span><span class="status-val" style="color:var(--success)">NOMINAL</span></div>
    <div class="status-row"><span class="status-key">MONITORING</span><span class="status-val">✓ ENABLED</span></div>
  </div>
  <div class="links">
    <a class="link-btn" href="/admin">Admin Dashboard</a>
    <a class="link-btn" href="/login">Back to Login</a>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<script>
async function logout() {
  await fetch('/api/logout',{method:'POST'});
  window.location.href='/login';
}
</script>
</body>
</html>
